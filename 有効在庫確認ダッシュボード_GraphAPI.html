<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>有効在庫確認ダッシュボード｜花岡車輌</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://alcdn.msauth.net/browser/2.32.2/js/msal-browser.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3348;
  --accent:#4f8ef7;--accent2:#f76c4f;--green:#3ecf8e;--yellow:#f5c542;
  --text:#e8eaf0;--text-muted:#7b82a0;--text-dim:#4a5170;
  --radius:10px;--font:'Noto Sans JP',sans-serif;--mono:'DM Mono',monospace;
}
body.light {
  --bg:#f4f6fb;--surface:#ffffff;--surface2:#eef1f8;--border:#d8dde8;
  --accent:#2563eb;--accent2:#e54b2a;--green:#16a06a;--yellow:#c28a00;
  --text:#1a1f36;--text-muted:#5c657d;--text-dim:#9aa3b8;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .25s,color .25s;font-size:14px;}
body *{transition:background-color .2s,border-color .2s,color .2s;}

/* LOGIN */
#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px;padding:20px;}
.login-logo{width:64px;height:64px;background:#0078d4;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff;font-family:var(--mono);}
.login-title{font-size:20px;font-weight:600;}
.login-sub{font-size:13px;color:var(--text-muted);text-align:center;max-width:300px;line-height:1.7;}
.login-btn{display:flex;align-items:center;gap:10px;background:#0078d4;color:#fff;border:none;border-radius:8px;padding:13px 26px;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font);}
.login-btn:hover{opacity:.9;}
.login-btn svg{width:20px;height:20px;}
.login-err{color:var(--accent2);font-size:13px;text-align:center;max-width:320px;}

/* HEADER */
#appScreen{display:none;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:11px 18px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;flex-wrap:wrap;}
.header-logo{font-family:var(--mono);font-size:12px;color:var(--accent);letter-spacing:2px;border:1px solid var(--accent);padding:3px 8px;border-radius:4px;}
.header-title{font-size:15px;font-weight:500;}
.header-status{font-size:13px;display:flex;align-items:center;gap:5px;color:var(--text-muted);}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--border);flex-shrink:0;}
.status-dot.loading{background:var(--yellow);animation:pulse 1s infinite;}
.status-dot.ok{background:var(--green);}
.status-dot.error{background:var(--accent2);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.header-right{margin-left:auto;display:flex;align-items:center;gap:7px;}
.header-date{font-family:var(--mono);font-size:12px;color:var(--text-muted);}
.user-chip{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 12px 4px 6px;font-size:12px;color:var(--text-muted);}
.user-avatar{width:22px;height:22px;border-radius:50%;background:#0078d4;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;}
.icon-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);padding:6px 13px;border-radius:6px;font-size:13px;cursor:pointer;font-family:var(--font);transition:all .2s;white-space:nowrap;}
.icon-btn:hover{border-color:var(--accent);color:var(--accent);}
.icon-btn:disabled{opacity:.4;cursor:not-allowed;}

/* LAYOUT — ズーム耐性: min-width固定ではなくminmax使用 */
.app{display:grid;grid-template-columns:minmax(260px,300px) 1fr;height:calc(100vh - 53px);}
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;min-width:0;}

/* ===== 折りたたみパネル共通 ===== */
.collapsible-panel{flex-shrink:0;border-bottom:1px solid var(--border);}
.panel-toggle{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 14px;cursor:pointer;user-select:none;
  background:var(--surface);transition:background .15s;
}
.panel-toggle:hover{background:var(--surface2);}
.panel-toggle-left{display:flex;align-items:center;gap:8px;}
.panel-label{font-size:11px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;font-family:var(--mono);}
/* ステータスドット群（折りたたみヘッダーに表示） */
.panel-dots{display:flex;gap:4px;align-items:center;}
.panel-arrow{font-size:10px;color:var(--text-dim);transition:transform .2s;}
.panel-arrow.open{transform:rotate(180deg);}
.panel-body{overflow:hidden;transition:max-height .25s ease, opacity .2s;max-height:0;opacity:0;}
.panel-body.open{max-height:300px;opacity:1;}
.panel-body-inner{padding:8px 14px 10px;}

/* DATA SOURCE */
.load-item{display:flex;align-items:center;gap:8px;padding:3px 0;}
.load-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.load-dot.pending{background:var(--border);}
.load-dot.loading{background:var(--yellow);animation:pulse 1s infinite;}
.load-dot.ok{background:var(--green);}
.load-dot.error{background:var(--accent2);}
.load-name{font-size:12px;color:var(--text-muted);flex:1;}
.load-msg{font-size:11px;color:var(--text-dim);font-family:var(--mono);}

/* フィルター */
.filter-chips{display:flex;flex-wrap:wrap;gap:5px;}
.chip{
  font-size:12px;padding:5px 12px;border-radius:20px;
  border:1px solid var(--border);color:var(--text-muted);
  cursor:pointer;font-family:var(--font);transition:all .15s;white-space:nowrap;
  /* ズーム時に押しやすいよう最小タップサイズを確保 */
  min-height:30px;display:inline-flex;align-items:center;
}
.chip:hover{border-color:var(--accent);color:var(--accent);}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff;}

/* 検索 */
.search-wrap{padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.search-input{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  color:var(--text);padding:9px 12px;border-radius:7px;
  font-size:14px;/* 年配者向けに少し大きく */
  font-family:var(--font);
}
.search-input:focus{outline:none;border-color:var(--accent);}
.search-input:disabled{opacity:.5;cursor:not-allowed;}

/* 品目リスト */
.item-count{padding:5px 16px;font-size:11px;color:var(--text-dim);font-family:var(--mono);flex-shrink:0;}
.item-list{flex:1;overflow-y:auto;padding:5px 7px;}
.item-list::-webkit-scrollbar{width:3px;}
.item-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

.item-card{padding:11px 13px;border-radius:8px;cursor:pointer;margin-bottom:4px;border:1px solid transparent;transition:all .15s;}
.item-card:hover{background:var(--surface2);border-color:var(--border);}
.item-card.active{background:rgba(79,142,247,.1);border-color:var(--accent);}
.item-card-code{font-size:11px;color:var(--text-dim);font-family:var(--mono);margin-bottom:2px;}
.item-card-name{font-size:14px;/* 年配者向けに大きく */font-weight:500;line-height:1.4;margin-bottom:6px;}
.item-card-footer{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.stock-pill{font-size:12px;/* 在庫数も少し大きく */font-family:var(--mono);padding:3px 9px;border-radius:10px;font-weight:600;}
.stock-pill.positive{background:rgba(62,207,142,.15);color:var(--green);}
.stock-pill.negative{background:rgba(247,108,79,.15);color:var(--accent2);}
.stock-pill.zero{background:rgba(245,197,66,.13);color:var(--yellow);}
.cat-tag{font-size:10px;color:var(--text-dim);background:var(--surface2);border:1px solid var(--border);padding:1px 6px;border-radius:4px;font-family:var(--mono);max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* MAIN */
.main{overflow-y:auto;padding:20px;}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--text-muted);}
.empty-state .icon{font-size:48px;}
.empty-state p{font-size:16px;font-weight:500;}
.empty-state .sub{font-size:13px;color:var(--text-dim);font-family:var(--mono);}
.item-header{display:flex;gap:20px;margin-bottom:18px;flex-wrap:wrap;}
.item-header-info{flex:1;min-width:200px;}
.item-header-code{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--accent);letter-spacing:1px;}
.item-header-name{font-size:18px;/* 品目名を大きく */font-weight:600;margin:4px 0 8px;line-height:1.4;}
.item-header-meta{display:flex;gap:6px;flex-wrap:wrap;}
.meta-tag{font-size:12px;padding:3px 10px;border-radius:4px;background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);font-family:var(--mono);}
.meta-tag.cat{border-color:var(--accent);color:var(--accent);}
.kpi-row{display:flex;gap:12px;flex-wrap:wrap;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 18px;min-width:115px;text-align:center;}
.kpi-label{font-size:11px;color:var(--text-dim);font-family:var(--mono);margin-bottom:6px;letter-spacing:.3px;}
.kpi-value{font-size:22px;/* KPI数値を大きく */font-weight:700;font-family:var(--mono);}
.kpi-value.positive{color:var(--green);}
.kpi-value.negative{color:var(--accent2);}
.kpi-value.zero{color:var(--yellow);}
.kpi-sub{font-size:12px;color:var(--text-dim);margin-top:3px;}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px;}
.card-title{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;font-family:var(--mono);}
.chart-wrap{position:relative;height:220px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.table-card-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);}
.row-count{font-size:11px;color:var(--text-dim);font-family:var(--mono);}
.table-scroll{overflow-x:auto;max-height:260px;overflow-y:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;/* テーブル本文も少し大きく */}
thead th{background:var(--surface2);padding:9px 10px;text-align:left;font-weight:600;color:var(--text-muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;position:sticky;top:0;white-space:nowrap;font-family:var(--mono);}
tbody tr{border-top:1px solid var(--border);}
tbody tr:hover{background:var(--surface2);}
td{padding:8px 10px;white-space:nowrap;}
.num{text-align:right;font-family:var(--mono);font-size:13px;}
.c-pos{color:var(--green);}.c-neg{color:var(--accent2);}.c-in{color:var(--green);}.c-out{color:var(--accent2);}.c-muted{color:var(--text-muted);}
.type-badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:700;font-family:var(--mono);}
.type-手配,.type-手予{background:rgba(79,142,247,.2);color:var(--accent);}
.type-従予{background:rgba(62,207,142,.2);color:var(--green);}
.type-出庫,.type-売予{background:rgba(247,108,79,.2);color:var(--accent2);}
.type-other{background:rgba(100,100,140,.2);color:var(--text-muted);}

/* ズーム耐性：1200px以下でグリッドを1列に */
@media(max-width:1200px){.grid-2{grid-template-columns:1fr;}}

/* スマホ・小画面対応 */
@media(max-width:768px){
  .app{grid-template-columns:1fr;}
  .sidebar{display:none;position:fixed;z-index:50;top:53px;left:0;width:280px;height:calc(100vh - 53px);box-shadow:4px 0 20px rgba(0,0,0,.3);}
  .sidebar.open{display:flex;}
  .grid-2{grid-template-columns:1fr;}
  .item-header{flex-direction:column;}
  .kpi-row{grid-template-columns:1fr 1fr;display:grid;}
  .menu-btn{display:block !important;}
  .header{flex-wrap:wrap;gap:6px;padding:8px 12px;}
  .header-date{display:none;}
  /* ズーム150%相当でもヘッダーが潰れないようuser-chipを隠す */
  .user-chip span{display:none;}
}
/* ヘッダー過密対策：幅が足りなくなったときに日付を隠す */
@media(max-width:1100px){.header-date{display:none;}}
@media(max-width:900px){.user-chip span{display:none;}}
.menu-btn{display:none;}
</style>
</head>
<body class="light">

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-logo">花</div>
  <div class="login-title">有効在庫確認ダッシュボード</div>
  <div class="login-sub">Microsoftアカウントでサインインして OneDrive のデータにアクセスします</div>
  <button class="login-btn" id="loginBtn">
    <svg viewBox="0 0 21 21" fill="none"><rect width="10" height="10" fill="#F25022"/><rect x="11" width="10" height="10" fill="#7FBA00"/><rect y="11" width="10" height="10" fill="#00A4EF"/><rect x="11" y="11" width="10" height="10" fill="#FFB900"/></svg>
    Microsoftアカウントでサインイン
  </button>
  <div id="loginErr" class="login-err" style="display:none"></div>
</div>

<!-- APP -->
<div id="appScreen">
  <header class="header">
    <div class="header-logo">花岡車輌</div>
    <div class="header-title">有効在庫確認ダッシュボード</div>
    <div class="header-status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">初期化中...</span>
    </div>
    <div class="header-right">
      <button class="menu-btn icon-btn" id="menuBtn" onclick="toggleSidebar()">☰ 絞り込み</button>
      <button class="icon-btn" id="reloadBtn" onclick="loadAll()">🔄 最新データ取得</button>
      <button class="icon-btn" id="themeBtn" onclick="toggleTheme()">🌙 ダークモード</button>
      <div class="user-chip" id="userChip">
        <div class="user-avatar" id="userAvatar">?</div>
        <span id="userName">-</span>
      </div>
      <button class="icon-btn" onclick="logout()">サインアウト</button>
      <div class="header-date" id="hDate"></div>
    </div>
  </header>

  <div class="app">
    <aside class="sidebar" id="sidebar">

      <!-- DATA SOURCE：折りたたみ可能 -->
      <div class="collapsible-panel" id="dataSourcePanel">
        <div class="panel-toggle" onclick="togglePanel('dataSource')">
          <div class="panel-toggle-left">
            <div class="panel-dots">
              <span class="load-dot pending" id="dot-master"></span>
              <span class="load-dot pending" id="dot-detail"></span>
              <span class="load-dot pending" id="dot-daily"></span>
            </div>
            <span class="panel-label">DATA SOURCE</span>
          </div>
          <span class="panel-arrow open" id="arrow-dataSource">▼</span>
        </div>
        <div class="panel-body open" id="body-dataSource">
          <div class="panel-body-inner">
            <div class="load-item"><span class="load-dot pending" id="dot-master-detail"></span><span class="load-name">品目マスタ</span><span class="load-msg" id="msg-master">—</span></div>
            <div class="load-item"><span class="load-dot pending" id="dot-detail-detail"></span><span class="load-name">在庫詳細</span><span class="load-msg" id="msg-detail">—</span></div>
            <div class="load-item"><span class="load-dot pending" id="dot-daily-detail"></span><span class="load-name">日別在庫</span><span class="load-msg" id="msg-daily">—</span></div>
          </div>
        </div>
      </div>

      <!-- フィルター：折りたたみ可能 -->
      <div class="collapsible-panel" id="filterPanel">
        <div class="panel-toggle" onclick="togglePanel('filter')">
          <div class="panel-toggle-left">
            <span class="panel-label">業務納期確認 フィルター</span>
          </div>
          <span class="panel-arrow" id="arrow-filter">▼</span>
        </div>
        <div class="panel-body" id="body-filter">
          <div class="panel-body-inner">
            <div class="filter-chips" id="filterChips">
              <span class="chip active" onclick="setFilter(null)">すべて</span>
            </div>
          </div>
        </div>
      </div>

      <!-- 検索 -->
      <div class="search-wrap">
        <input class="search-input" type="text" id="searchInput" placeholder="🔍 品目名・コードで検索..." disabled>
      </div>
      <div class="item-count" id="itemCount">— 件</div>
      <div class="item-list" id="itemList">
        <div style="padding:20px 8px;text-align:center;color:var(--text-dim);font-size:12px;line-height:1.8;">
          サインイン後に<br>データを読み込みます
        </div>
      </div>
    </aside>

    <main class="main" id="mainArea">
      <div class="empty-state">
        <div class="icon">📦</div>
        <p>サインインしてください</p>
        <div class="sub" id="loadProgress">0 / 3 完了</div>
      </div>
    </main>
  </div>
</div>

<script>
// ============================================================
// MSAL CONFIG
// ============================================================
const MSAL_CONFIG = {
  auth: {
    clientId: 'd338d61b-01dc-4c7c-ac6b-aecf7f30d716',
    authority: 'https://login.microsoftonline.com/3933e8a0-c945-4e97-ae67-c82131087cad',
    redirectUri: window.location.origin + window.location.pathname,
  },
  cache: { cacheLocation: 'sessionStorage' }
};
const SCOPES = ['User.Read', 'Files.Read', 'Sites.Read.All'];

// Graph API 固定値（動作確認済み）
const DRIVE_ID  = 'b!JT-BVyiLrECv-h59BtVoApKOQutjbKlGoUT2oig6LyO9OVKLtnvUTZME-5sIaRxU';
const FILE_PATH = 'apps/data/inventory_data.xlsx';
const SHEETS = { master:'品目マスタ', detail:'有効在庫台帳_在庫詳細', daily:'有効在庫台帳_日別在庫' };

// ============================================================
// STATE
// ============================================================
let msalInstance=null, account=null, chartInstance=null, loadedCount=0;
const store = {
  master:{}, detail:{}, daily:{},
  items:[], bizCategories:[],
  loaded:{master:false,detail:false,daily:false},
  activeCode:null, activeFilter:null,
};

document.getElementById('hDate').textContent =
  new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'});

// ============================================================
// INIT
// ============================================================
async function init() {
  msalInstance = new msal.PublicClientApplication(MSAL_CONFIG);
  await msalInstance.initialize();
  if (localStorage.getItem('inv_theme')==='dark') {
    document.body.classList.remove('light');
    document.getElementById('themeBtn').textContent='☀️ ライトモード';
  }
  const accounts = msalInstance.getAllAccounts();
  if (accounts.length > 0) { account=accounts[0]; showApp(); loadAll(); }
  document.getElementById('loginBtn').onclick = login;
  document.getElementById('searchInput').addEventListener('input', applyFilter);
}

// ============================================================
// AUTH
// ============================================================
async function login() {
  try {
    document.getElementById('loginErr').style.display='none';
    const result = await msalInstance.loginPopup({ scopes: SCOPES });
    account = result.account;
    showApp(); loadAll();
  } catch(e) {
    document.getElementById('loginErr').textContent='サインインに失敗しました: '+e.message;
    document.getElementById('loginErr').style.display='block';
  }
}

function logout() {
  msalInstance.logoutPopup({ account });
  document.getElementById('appScreen').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
}

async function getToken() {
  try { return (await msalInstance.acquireTokenSilent({scopes:SCOPES,account})).accessToken; }
  catch { return (await msalInstance.acquireTokenPopup({scopes:SCOPES})).accessToken; }
}

function showApp() {
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appScreen').style.display='block';
  const name = account.name || account.username;
  document.getElementById('userName').textContent = name.split(' ')[0];
  document.getElementById('userAvatar').textContent = name.charAt(0).toUpperCase();
}

// ============================================================
// LOAD
// ============================================================
async function loadAll() {
  loadedCount=0;
  store.loaded={master:false,detail:false,daily:false};
  const btn=document.getElementById('reloadBtn');
  btn.disabled=true; btn.textContent='取得中...';
  setStatus('loading','OneDrive からデータ取得中...');
  updateProgress();
  ['master','detail','daily'].forEach(k=>{setDot(k,'pending');setMsg(k,'—');});

  try {
    const token = await getToken();
    const h = { Authorization:'Bearer '+token };

    // ファイルID取得
    const fRes = await fetch(`https://graph.microsoft.com/v1.0/drives/${DRIVE_ID}/root:/${encodeURIComponent(FILE_PATH)}`,{headers:h});
    if(!fRes.ok) throw new Error('ファイルが見つかりません: '+FILE_PATH);
    const fileId = (await fRes.json()).id;

    // 3シート並列取得
    await Promise.all([
      fetchSheet(token,fileId,'master',SHEETS.master,parseMasterRows),
      fetchSheet(token,fileId,'detail',SHEETS.detail,parseDetailRows),
      fetchSheet(token,fileId,'daily', SHEETS.daily, parseDailyRows),
    ]);

    if(store.loaded.detail && store.loaded.daily){
      buildItemList();
      setStatus('ok',`${store.items.length}品目 読み込み済`);
      // 読み込み完了後にデータソースパネルを自動で折りたたむ
      setTimeout(collapseDataSource, 800);
    } else {
      setStatus('error','一部のシートの取得に失敗しました');
    }
  } catch(e) {
    setStatus('error','エラー: '+e.message);
    console.error(e);
  }
  btn.disabled=false; btn.textContent='🔄 最新データ取得';
}

async function fetchSheet(token,fileId,key,sheetName,parser){
  setDot(key,'loading'); setMsg(key,'取得中...');
  try{
    const url=`https://graph.microsoft.com/v1.0/drives/${DRIVE_ID}/items/${fileId}/workbook/worksheets/${encodeURIComponent(sheetName)}/usedRange`;
    const res=await fetch(url,{headers:{Authorization:'Bearer '+token}});
    if(!res.ok) throw new Error(`シート「${sheetName}」取得失敗(${res.status})`);
    const data=await res.json();
    const [header,...rows]=data.values;
    const cleaned=rows.map(r=>Object.fromEntries(
      header.map((h,i)=>[String(h).replace(/^\uFEFF/,'').replace(/^"+|"+$/g,'').trim(), r[i]??''])
    ));
    parser(cleaned);
    setDot(key,'ok'); setMsg(key,`${cleaned.length}件`);
    loadedCount++; updateProgress();
  }catch(e){
    console.warn(key,e); setDot(key,'error'); setMsg(key,'エラー');
  }
}

const updateProgress=()=>document.getElementById('loadProgress').textContent=`${loadedCount} / 3 完了`;
const setDot=(k,s)=>{
  // ヘッダー用（小ドット）
  const e=document.getElementById(`dot-${k}`);if(e)e.className=`load-dot ${s}`;
  // 詳細パネル用
  const e2=document.getElementById(`dot-${k}-detail`);if(e2)e2.className=`load-dot ${s}`;
};
const setMsg=(k,m)=>{const e=document.getElementById(`msg-${k}`);if(e)e.textContent=m;};
const setStatus=(s,t)=>{document.getElementById('statusDot').className=`status-dot ${s}`;document.getElementById('statusText').textContent=t;};

// 折りたたみパネル制御
function togglePanel(id){
  const body=document.getElementById(`body-${id}`);
  const arrow=document.getElementById(`arrow-${id}`);
  const isOpen=body.classList.contains('open');
  body.classList.toggle('open',!isOpen);
  arrow.classList.toggle('open',!isOpen);
}
// 読み込み完了後にデータソースパネルを自動で折りたたむ
function collapseDataSource(){
  const body=document.getElementById('body-dataSource');
  const arrow=document.getElementById('arrow-dataSource');
  if(body&&arrow){body.classList.remove('open');arrow.classList.remove('open');}
}

// ============================================================
// PARSERS
// ============================================================
function col(row,...keys){
  for(const k of keys){
    if(row[k]!==undefined&&row[k]!=='') return row[k];
    for(const rk of Object.keys(row))
      if(rk.replace(/^\uFEFF/,'').trim()===k) return row[rk];
  }
  return '';
}

function parseMasterRows(rows){
  store.master={};
  for(const row of rows){
    const code=String(col(row,'品目ｺｰﾄﾞ','品目コード')||'').trim();
    if(!code||code==='0') continue;
    const bcRaw=col(row,'業務納期確認ｺｰﾄﾞ','業務納期確認');
    const bc=String(bcRaw??'').trim();
    const bn=String(col(row,'業務納期確認名')??'').trim();
    const hasCat=bcRaw!==0&&bc!==''&&bc!=='0'&&bc!=='000000';
    store.master[code]={
      name:String(col(row,'品目名')||code),
      unit:String(col(row,'単位')||'個'),
      bizCode:hasCat?bc:'', bizName:hasCat?bn:'',
    };
  }
  store.loaded.master=true;
}

function parseDetailRows(rows){
  store.detail={};
  for(const row of rows){
    const code=String(col(row,'品目コード','品目ｺｰﾄﾞ')||'').trim();
    if(!code) continue;
    if(!store.detail[code]) store.detail[code]=[];
    const dateRaw=String(col(row,'予定日')||'');
    store.detail[code].push({
      date:dateRaw.includes('T')?dateRaw.slice(0,10):dateRaw.split(' ')[0],
      type:String(col(row,'区分')||''),
      order_no:String(col(row,'受発注№','受発注No')||''),
      seiban:String(col(row,'製番')||''),
      supplier:String(col(row,'取引先名')||''),
      in_qty:Number(col(row,'入庫予定数')||0),
      out_qty:Number(col(row,'出庫予定数')||0),
      stock:Number(col(row,'有効在庫数')||0),
    });
  }
  store.loaded.detail=true;
}

function parseDailyRows(rows){
  store.daily={};
  for(const row of rows){
    const code=String(col(row,'品目コード','品目ｺｰﾄﾞ')||'').trim();
    if(!code) continue;
    if(!store.daily[code]) store.daily[code]=[];
    const dateRaw=String(col(row,'予定日')||'');
    store.daily[code].push({
      date:dateRaw.includes('T')?dateRaw.slice(0,10):dateRaw.split(' ')[0],
      in_qty:Number(col(row,'入庫予定数')||0),
      out_qty:Number(col(row,'出庫予定数')||0),
      available:Number(col(row,'出荷可能在庫数')||0),
      first_stock:Number(col(row,'期首在庫')||0),
    });
  }
  store.loaded.daily=true;
}

// ============================================================
// BUILD ITEM LIST
// ============================================================
function buildItemList(){
  const codes=[...new Set([...Object.keys(store.detail),...Object.keys(store.daily)])].filter(Boolean).sort();
  store.items=codes.map(code=>{
    const m=store.master[code]||{name:code,unit:'個',bizCode:'',bizName:''};
    const dr=store.daily[code]||[];
    return{code,name:m.name,unit:m.unit,bizCode:m.bizCode,bizName:m.bizName,
           lastAvail:dr.length?dr[dr.length-1].available:0};
  });
  const bm={};
  for(const it of store.items) if(it.bizCode&&!bm[it.bizCode]) bm[it.bizCode]=it.bizName;
  store.bizCategories=Object.entries(bm).sort((a,b)=>a[1].localeCompare(b[1])).map(([c,n])=>({code:c,name:n}));
  renderFilterChips();
  document.getElementById('searchInput').disabled=false;
  applyFilter();
  document.getElementById('mainArea').innerHTML=`
    <div class="empty-state">
      <div class="icon">👈</div>
      <p>左から品目を選択してください</p>
      <div class="sub">${store.items.length} 品目 読み込み済</div>
    </div>`;
}

// ============================================================
// FILTER & LIST
// ============================================================
function renderFilterChips(){
  const el=document.getElementById('filterChips');
  el.innerHTML=`<span class="chip ${!store.activeFilter?'active':''}" onclick="setFilter(null)">すべて</span>`
    +store.bizCategories.map(c=>`<span class="chip ${store.activeFilter===c.code?'active':''}" onclick="setFilter('${c.code}')" title="${c.name}">${c.name}</span>`).join('');
}
function setFilter(bizCode){store.activeFilter=bizCode;renderFilterChips();applyFilter();}
function applyFilter(){
  const q=(document.getElementById('searchInput').value||'').trim().toLowerCase();
  let list=store.items;
  if(store.activeFilter) list=list.filter(it=>it.bizCode===store.activeFilter);
  if(q) list=list.filter(it=>it.name.toLowerCase().includes(q)||it.code.toLowerCase().includes(q));
  renderList(list);
}
function renderList(items){
  document.getElementById('itemCount').textContent=`${items.length} 品目`;
  const el=document.getElementById('itemList');
  if(!items.length){el.innerHTML='<div style="padding:18px 8px;text-align:center;color:var(--text-dim);font-size:11px;">一致する品目がありません</div>';return;}
  el.innerHTML=items.map(it=>{
    const v=it.lastAvail;
    const cls=v>0?'positive':v<0?'negative':'zero';
    const act=it.code===store.activeCode?' active':'';
    const ct=it.bizName?`<span class="cat-tag" title="${it.bizName}">${it.bizName}</span>`:'';
    const esc=it.code.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return`<div class="item-card${act}" onclick="selectItem('${esc}')">
      <div class="item-card-code">${it.code}</div>
      <div class="item-card-name">${it.name}</div>
      <div class="item-card-footer"><span class="stock-pill ${cls}">${v.toLocaleString()} ${it.unit}</span>${ct}</div>
    </div>`;
  }).join('');
}

// ============================================================
// SELECT & RENDER MAIN
// ============================================================
function selectItem(code){store.activeCode=code;applyFilter();renderMain(code);}

function renderMain(code){
  const item=store.items.find(i=>i.code===code)||{code,name:code,unit:'個',lastAvail:0,bizCode:'',bizName:''};
  const daily=(store.daily[code]||[]).slice().sort((a,b)=>a.date.localeCompare(b.date));
  const detail=(store.detail[code]||[]).slice().sort((a,b)=>a.date.localeCompare(b.date));
  const totalIn=daily.reduce((s,r)=>s+r.in_qty,0);
  const totalOut=daily.reduce((s,r)=>s+r.out_qty,0);
  const cur=daily.length?daily[daily.length-1].available:0;
  const fs=daily.length?daily[0].first_stock:0;
  const mx=daily.length?Math.max(...daily.map(r=>r.available)):0;
  const mn=daily.length?Math.min(...daily.map(r=>r.available)):0;
  const ac=cur>0?'positive':cur<0?'negative':'zero';

  document.getElementById('mainArea').innerHTML=`
    <div class="item-header">
      <div class="item-header-info">
        <div class="item-header-code">${code}</div>
        <div class="item-header-name">${item.name}</div>
        <div class="item-header-meta">
          <span class="meta-tag">単位: ${item.unit}</span>
          ${item.bizName?`<span class="meta-tag cat">${item.bizName}</span>`:''}
        </div>
      </div>
      <div class="kpi-row">
        <div class="kpi"><div class="kpi-label">期首在庫</div><div class="kpi-value ${fs>=0?'positive':'negative'}">${fs.toLocaleString()}</div><div class="kpi-sub">${item.unit}</div></div>
        <div class="kpi"><div class="kpi-label">出荷可能（最新）</div><div class="kpi-value ${ac}">${cur.toLocaleString()}</div><div class="kpi-sub">${item.unit}</div></div>
        <div class="kpi"><div class="kpi-label">入庫予定 合計</div><div class="kpi-value positive">+${totalIn.toLocaleString()}</div><div class="kpi-sub">${item.unit}</div></div>
        <div class="kpi"><div class="kpi-label">出庫予定 合計</div><div class="kpi-value zero">-${totalOut.toLocaleString()}</div><div class="kpi-sub">${item.unit}</div></div>
        <div class="kpi"><div class="kpi-label">最大 / 最小</div><div class="kpi-value" style="font-size:15px;color:var(--text)">${mx.toLocaleString()} / <span style="color:var(--accent2)">${mn.toLocaleString()}</span></div><div class="kpi-sub">${item.unit}</div></div>
      </div>
    </div>
    <div class="chart-card">
      <div class="card-title">出荷可能在庫数 推移（日別）</div>
      <div class="chart-wrap"><canvas id="stockChart"></canvas></div>
    </div>
    <div class="grid-2">
      <div class="table-card">
        <div class="table-card-header"><div class="card-title" style="margin:0">日別在庫</div><span class="row-count">${daily.length}件</span></div>
        <div class="table-scroll"><table>
          <thead><tr><th>予定日</th><th>期首在庫</th><th>入庫予定</th><th>出庫予定</th><th>出荷可能</th></tr></thead>
          <tbody>${daily.map(r=>`<tr>
            <td class="num">${r.date}</td>
            <td class="num ${r.first_stock>=0?'c-pos':'c-neg'}">${r.first_stock.toLocaleString()}</td>
            <td class="num c-in">${r.in_qty>0?'+'+r.in_qty.toLocaleString():''}</td>
            <td class="num c-out">${r.out_qty>0?'-'+r.out_qty.toLocaleString():''}</td>
            <td class="num ${r.available>0?'c-pos':r.available<0?'c-neg':'c-muted'}">${r.available.toLocaleString()}</td>
          </tr>`).join('')}</tbody>
        </table></div>
      </div>
      <div class="table-card">
        <div class="table-card-header"><div class="card-title" style="margin:0">在庫詳細（受発注明細）</div><span class="row-count">${detail.length}件</span></div>
        <div class="table-scroll"><table>
          <thead><tr><th>予定日</th><th>区分</th><th>受発注№</th><th>製番</th><th>取引先</th><th>入庫</th><th>出庫</th><th>有効在庫</th></tr></thead>
          <tbody>${detail.map(r=>{
            const tc=['手配','手予','従予','出庫','売予'].includes(r.type)?`type-${r.type}`:'type-other';
            return`<tr>
              <td class="num">${r.date}</td>
              <td><span class="type-badge ${tc}">${r.type}</span></td>
              <td class="num c-muted">${r.order_no}</td>
              <td class="num c-muted" style="font-size:10px">${r.seiban}</td>
              <td style="font-size:10px;color:var(--text-muted)">${r.supplier}</td>
              <td class="num c-in">${r.in_qty>0?'+'+r.in_qty.toLocaleString():''}</td>
              <td class="num c-out">${r.out_qty>0?'-'+r.out_qty.toLocaleString():''}</td>
              <td class="num ${r.stock>0?'c-pos':r.stock<0?'c-neg':'c-muted'}">${r.stock.toLocaleString()}</td>
            </tr>`;
          }).join('')}</tbody>
        </table></div>
      </div>
    </div>`;
  redrawChart();
}

// ============================================================
// CHART
// ============================================================
function redrawChart(){
  if(!store.activeCode) return;
  const daily=(store.daily[store.activeCode]||[]).slice().sort((a,b)=>a.date.localeCompare(b.date));
  if(chartInstance){chartInstance.destroy();chartInstance=null;}
  const ctx=document.getElementById('stockChart');
  if(!ctx||!daily.length) return;
  const L=document.body.classList.contains('light');
  const gc=L?'rgba(200,210,230,0.6)':'rgba(46,51,72,0.6)';
  const tc=L?'#9aa3b8':'#4a5170';
  const tb=L?'#ffffff':'#22263a';
  const tbd=L?'#d8dde8':'#2e3348';
  chartInstance=new Chart(ctx,{
    type:'line',
    data:{
      labels:daily.map(r=>r.date.replace(/^\d{4}\//,'').replace(/^\d{4}-/,'')),
      datasets:[
        {label:'出荷可能在庫',data:daily.map(r=>r.available),
          borderColor:L?'#2563eb':'#4f8ef7',backgroundColor:L?'rgba(37,99,235,0.07)':'rgba(79,142,247,0.08)',
          borderWidth:2,pointRadius:3,fill:true,tension:0.3,yAxisID:'y'},
        {label:'入庫予定',data:daily.map(r=>r.in_qty),type:'bar',
          backgroundColor:L?'rgba(22,160,106,0.45)':'rgba(62,207,142,0.5)',barThickness:6,yAxisID:'y2'},
        {label:'出庫予定',data:daily.map(r=>-r.out_qty),type:'bar',
          backgroundColor:L?'rgba(229,75,42,0.4)':'rgba(247,108,79,0.5)',barThickness:6,yAxisID:'y2'},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{labels:{color:L?'#5c657d':'#7b82a0',font:{size:10,family:'DM Mono'},boxWidth:12,padding:12}},
        tooltip:{backgroundColor:tb,borderColor:tbd,borderWidth:1,
          titleColor:L?'#1a1f36':'#e8eaf0',bodyColor:L?'#5c657d':'#7b82a0',
          titleFont:{family:'DM Mono',size:11},bodyFont:{family:'Noto Sans JP',size:11}}
      },
      scales:{
        x:{ticks:{color:tc,font:{size:9,family:'DM Mono'},maxRotation:45},grid:{color:gc}},
        y:{position:'left',ticks:{color:tc,font:{size:9}},grid:{color:gc},title:{display:true,text:'出荷可能在庫',color:tc,font:{size:9}}},
        y2:{position:'right',ticks:{color:tc,font:{size:9}},grid:{display:false},title:{display:true,text:'入出庫数',color:tc,font:{size:9}}}
      }
    }
  });
}

// ============================================================
// UI HELPERS
// ============================================================
function toggleTheme(){
  const isL=document.body.classList.toggle('light');
  document.getElementById('themeBtn').textContent=isL?'🌙 ダークモード':'☀️ ライトモード';
  localStorage.setItem('inv_theme',isL?'light':'dark');
  if(store.activeCode) redrawChart();
}
function toggleSidebar(){
  const sb=document.getElementById('sidebar');
  sb.classList.toggle('open');
  document.getElementById('menuBtn').textContent=sb.classList.contains('open')?'✕ 閉じる':'☰ 絞り込み';
}

init();
</script>
